apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox
          command: ["/bin/sh", "-c", "until nc -z postgres-service 5432; do sleep 2; done"]
        - name: wait-for-redis
          image: busybox
          command: ["/bin/sh", "-c", "until nc -z redis-service 6379; do sleep 2; done"]
        - name: wait-for-mongodb
          image: busybox
          command: ["/bin/sh", "-c", "until nc -z mongodb-service 27017; do sleep 2; done"]
      containers:
        - name: auth-service
          image: 2af-auth-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: auth-config
          env:
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: JWT_ACCESS_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: JWT_REFRESH_SECRET
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: INTERNAL_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
